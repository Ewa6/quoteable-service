- name: Retrieve all subscribers
  method: GET
  endpoint: /subscribers
  description: Returns all subscriber records.

- name: Retrieve a subscriber by ID
  method: GET
  endpoint: /subscribers/{id}
  description: Returns one subscriber by ID.

- name: Create a subscriber
  method: POST
  endpoint: /subscribers
  description: Creates a subscriber record.

- name: Replace a subscriber
  method: PUT
  endpoint: /subscribers/{id}
  description: Replaces an existing subscriber record.

- name: Delete a subscriber
  method: DELETE
  endpoint: /subscribers/{id}
  description: Deletes a subscriber record.

- name: Retrieve all quotes
  method: GET
  endpoint: /quotes
  description: Returns all quote records.

- name: Retrieve a quote by ID
  method: GET
  endpoint: /quotes/{id}
  description: Returns one quote by ID.

- name: Create a quote
  method: POST
  endpoint: /quotes
  description: Creates a quote record.

- name: Replace a quote
  method: PUT
  endpoint: /quotes/{id}
  description: Replaces an existing quote record.

- name: Delete a quote
  method: DELETE
  endpoint: /quotes/{id}
  description: Deletes a quote record.
